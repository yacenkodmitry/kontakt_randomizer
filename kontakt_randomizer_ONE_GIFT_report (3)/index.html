<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Контактный рандомайзер · Kontakt InterSearch</title>
  <link rel="stylesheet" href="styles.css?v=25" />
</head>
<body>
  <div class="bg-flowers" aria-hidden="true"></div>

  <main class="app">
    <header class="top">
      <div class="brand">
        <img src="logo.png" alt="Kontakt InterSearch" class="logo" style="height:42px;width:auto;max-width:260px" />
      </div>

      <div class="title-right">
        <div class="h1">КОНТАКТНЫЙ РАНДОМАЙЗЕР</div>
      </div>
</header>

    <section class="stage" id="stage">
      <!-- screens injected by JS -->
    </section>

    <footer class="footer"></footer>
  </main>

  <dialog class="modal" id="giftModal">
    <form method="dialog" class="modal-card" id="giftForm">
      <div class="modal-head">
        <div class="modal-title">🎁 Закрепите подарок за собой</div>
        <button type="button" class="icon-btn" id="closeGiftBtn" aria-label="Закрыть">✕</button>
      </div>

      <div class="modal-body">
        <div class="pill" id="giftPill"></div>
        <div class="small" id="giftNote"></div>

        <div class="grid">
          <label>
            <span>Имя</span>
            <input name="name" autocomplete="name" placeholder="Как к вам обращаться" required />
          </label>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" placeholder="name@company.com" required />
          </label>
          <label>
            <span>Компания</span>
            <input name="company" autocomplete="organization" placeholder="Например, ACME" />
          </label>
          <label>
            <span>Должность</span>
            <input name="title" autocomplete="organization-title" placeholder="Например, HRBP" />
          </label>
          <label class="full">
            <span>Телефон (необязательно)</span>
            <input name="phone" autocomplete="tel" placeholder="+7 ..." />
          </label>
        </div>

        <div class="small">
          Подарок может быть получен только один раз и закрепляется за вашим email.
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn primary" id="submitGift" type="submit">✨ Получить подарок</button>
        <button class="btn ghost" id="skipGift" type="button">Продолжить без подарка</button>
      </div>
    </form>
  </dialog>

  <script src="cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
